name: Focused EasyAR sample run issue
description: Report an Image Tracking, Cloud Recognition, or Mega run-through problem.
title: "[Sample Run]: "
labels:
  - sample-run
body:
  - type: markdown
    attributes:
      value: |
        Use this template for the current focused scope: Image Tracking, Cloud Recognition, and Mega.

        Before posting, run `easyar_write_issue_report` and paste the generated `ISSUE_REPORT.md` content below. Do not include EasyAR license keys, account tokens, Cloud Recognition appKey/appSecret, signing keys, provisioning profiles, or full private logs.
  - type: dropdown
    id: sample
    attributes:
      label: Sample
        options:
        - Image Tracking
        - Cloud Recognition
        - Mega
    validations:
      required: true
  - type: dropdown
    id: platform
    attributes:
      label: Platform
      options:
        - Android
        - iOS
    validations:
      required: true
  - type: dropdown
    id: status
    attributes:
      label: Latest status
      options:
        - blocked
        - failed
        - not-run
        - passed with warnings
    validations:
      required: true
  - type: textarea
    id: issue-report
    attributes:
      label: Redacted ISSUE_REPORT.md
      description: Paste the report generated by `easyar_write_issue_report`.
      render: markdown
    validations:
      required: true
  - type: textarea
    id: artifacts
    attributes:
      label: Referenced artifacts
      description: List generated artifact paths such as SUPPORT_BUNDLE.md, RUN_RESULT.md, SCENE_AUDIT.md, and relevant Unity log paths.
      placeholder: |
        - Assets/EasyARGenerated/cloud-recognition/SUPPORT_BUNDLE.md
        - Assets/EasyARGenerated/cloud-recognition/RUN_RESULT.md
        - Logs/mcp-easyar-CompileCheck.log
    validations:
      required: false
  - type: checkboxes
    id: safety
    attributes:
      label: Safety check
      options:
        - label: I removed EasyAR license keys, account tokens, Cloud Recognition appKey/appSecret, signing keys, provisioning profiles, and private account data.
          required: true
